<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MarkdownEditorDemo</title>
    <base href="/" />

    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="MarkdownEditorDemo.styles.css" rel="stylesheet" />
    <link href="manifest.json" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link href="lib/font-awesome/css/all.css" rel="stylesheet" />

    <!--
        MarkdownEditor styles. Load order matters: easymde.min.css first, then
        the component's markdowneditor.css overrides (Bootstrap Icons mapping
        for the EasyMDE toolbar, alert/callout styling, etc.).
        mermaid / highlight.js assets are NOT loaded here — they are pulled in
        on demand by the component when EnableMermaid / EnableHighlight are set.
    -->
    <link href="/_content/PSC.Blazor.Components.MarkdownEditor/css/easymde.min.css" rel="stylesheet" />
    <link href="/_content/PSC.Blazor.Components.MarkdownEditor/css/markdowneditor.css" rel="stylesheet" />

    <style>
        .app-loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.25rem;
            background: #ffffff;
            color: #555;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            z-index: 9999;
        }

        .app-loader__spinner {
            width: 56px;
            height: 56px;
            border: 4px solid #e5e7eb;
            border-top-color: #1b6ec2;
            border-radius: 50%;
            animation: app-loader-spin 0.9s linear infinite;
        }

        .app-loader__text {
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        @keyframes app-loader-spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="app-loader" role="status" aria-live="polite">
            <div class="app-loader__spinner" aria-hidden="true"></div>
            <div class="app-loader__text">Loading Markdown Editor demo&hellip;</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>

    <!-- jQuery is still referenced by markdownEditor.js (autosave cleanup helpers). -->
    <script src="lib/query/jquery.js"></script>

    <!-- PSC.Blazor.Components.CodeSnippet — used by the demo pages to render code blocks. -->
    <script src="/_content/PSC.Blazor.Components.CodeSnippet/codesnippet.js"></script>

    <!--
        EasyMDE (global) must load before markdownEditor.js so the wrapper can
        instantiate `new EasyMDE(...)`. markdownEditor.js defines the globals
        (`initialize`, `ensureAssets`, etc.) that the Blazor component invokes
        through JSInterop.
    -->
    <script src="/_content/PSC.Blazor.Components.MarkdownEditor/js/easymde.min.js"></script>
    <script src="/_content/PSC.Blazor.Components.MarkdownEditor/js/markdownEditor.js"></script>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-51944269-3"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'UA-51944269-3');
    </script>
</body>

</html>
